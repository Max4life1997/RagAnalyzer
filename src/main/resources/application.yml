server:
  port: 8080

spring:
  application:
    name: rag-analyzer

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  datasource:
    url: jdbc:postgresql://localhost:5432/rag_analyzer
    username: rag_user
    password: rag_password

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

app:
  storage:
    documents-dir: storage/documents

ollama:
  base-url: http://localhost:11434
  embedding-model: nomic-embed-text:latest
  chat-model: qwen2.5:7b

jwt:
  secret: change-this-to-a-random-256-bit-secret-in-production-please
  expiration-days: 7

rag:
  search:
    top-k: 8
    wiki-top-k: 12
    max-distance: 0.9

telegram:
  bot:
    enabled: true
    token: ${TELEGRAM_BOT_TOKEN:}
    username: raganalyzer_bot
    proxy:
      enabled: true
      type: HTTP
      host: 127.0.0.1
      port: 10809