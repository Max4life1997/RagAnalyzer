server:
  port: 8080

spring:
  application:
    name: rag-analyzer

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  datasource:
    url: jdbc:postgresql://localhost:5432/rag_analyzer
    username: rag_user
    password: rag_password

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  storage:
    documents-dir: storage/documents

ollama:
  base-url: http://localhost:11434
  embedding-model: nomic-embed-text:latest
  chat-model: llama3.2:3b

rag:
  search:
    top-k: 5
    max-distance: 0.75